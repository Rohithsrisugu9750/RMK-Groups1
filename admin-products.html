<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Products | RMK Groups</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
<!-- Preloader Disabled -->

    <header class="admin-header">
        <div class="admin-header-content">
            <button class="mobile-sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="admin-logo">
                <img src="logo.png" alt="RMK Groups" style="height: 50px; width: auto;">
                <span class="admin-badge">Admin</span>
            </div>
            <div class="admin-user">
                <div class="notification-icon">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">3</span>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=064E3B&color=fff" alt="Admin">
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <aside class="admin-sidebar">
        <nav class="sidebar-nav">
            <a href="admin-billing.html" class="nav-item">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Billing</span>
            </a>
            <a href="admin-customers.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin-products.html" class="nav-item active">
                <i class="fas fa-box"></i>
                <span>Products</span>
            </a>
            <a href="admin-inventory.html" class="nav-item">
                <i class="fas fa-warehouse"></i>
                <span>Inventory</span>
            </a>

            <a href="admin-reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
            <a href="admin-workers.html" class="nav-item">
                <i class="fas fa-user-friends"></i>
                <span>Workers</span>
            </a>
            <a href="admin-attendance.html" class="nav-item">
                <i class="fas fa-calendar-check"></i>
                <span>Attendance</span>
            </a>
            <a href="admin-settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item">
                <i class="fas fa-globe"></i>
                <span>View Website</span>
            </a>
        </div>
    </aside>

    <main class="admin-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Products Catalogue</h1>
                <p class="page-subtitle">Manage products, pricing, and details</p>
            </div>
            <div class="page-actions">
                <button class="btn btn-primary" id="addProductBtn">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </div>
        </div>

        <div class="data-table-container">
            <div class="table-controls" style="padding: 1.5rem;">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>
                <div class="filter-group">
                    <select class="filter-select">
                        <option>Category: All</option>
                        <option>Bricks</option>
                        <option>Pavers</option>
                        <option>Aggregates</option>
                    </select>
                </div>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Unit Price</th>
                        <th>GST</th>
                        <th>Stock Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data cleared -->
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem;">
                            No products found in catalogue.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <!-- Add Product Modal -->
    <div class="modal" id="addProductModal">
        <div class="modal-overlay"></div>
        <div class="modal-container" style="max-width: 600px;">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-box"></i>
                    Add New Product
                </h2>
                <button class="modal-close" id="closeProductModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="addProductForm">
                    <div class="form-group" style="margin-bottom: 1.25rem;">
                        <label>Product Name *</label>
                        <input type="text" class="form-control" name="productName"
                            placeholder="e.g. Fly Ash Brick - Standard" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Code / SKU *</label>
                            <input type="text" class="form-control" name="sku" placeholder="e.g. FAB-001" required>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select class="form-control" name="category" required>
                                <option value="">Select Category</option>
                                <option value="Bricks">Bricks</option>
                                <option value="Pavers">Pavers</option>
                                <option value="Aggregates">Aggregates</option>
                                <option value="Machinery">Machinery</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Unit Price (₹) *</label>
                            <input type="number" class="form-control" name="price" placeholder="0.00" step="0.01"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Price Unit</label>
                            <select class="form-control" name="unit">
                                <option value="piece">Per Piece</option>
                                <option value="sqft">Per Sq.ft</option>
                                <option value="ton">Per Ton</option>
                                <option value="bag">Per Bag</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Initial Stock Quantity</label>
                            <input type="number" class="form-control" name="stock" placeholder="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>GST Rate (%) *</label>
                            <select class="form-control" name="gstRate" required>
                                <option value="0">0% (Nil)</option>
                                <option value="5">5%</option>
                                <option value="12">12%</option>
                                <option value="18" selected>18%</option>
                                <option value="28">28%</option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="cancelProductBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="admin_core.js?v=2.1"></script>
</body>

</html>
